apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: {{ .Values.namespace }}
  labels:
    grafana_datasource: "1"     # el sidecar de datasources lo detecta (como el de dashboards)
data:
  loki-datasource.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki-gateway.monitoring.svc.cluster.local
        jsonData:
          maxLines: 1000