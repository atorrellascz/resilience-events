# ═══════════════════════════════════════════════════════════════════════
# PrometheusRule: define SLOs y alertas para events-api.
# Un PrometheusRule es un CRD (tipo de objeto que anadio el operador de
# Prometheus). El operador lo detecta y carga estas reglas en Prometheus.
# ═══════════════════════════════════════════════════════════════════════
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: events-api-slo
  namespace: monitoring
  labels:
    release: kube-prometheus-stack      # el operador solo adopta reglas con esta etiqueta
spec:
  groups:

    # ───────────────────────────────────────────────────────────────────
    # GRUPO 1 — RECORDING RULES: pre-calculan los SLIs.
    # Excluyen endpoints operativos (/health, /ready, /metrics) porque no
    # son trafico de usuario; incluirlos contamina el SLO con ruido.
    # ───────────────────────────────────────────────────────────────────
    - name: events-api.sli
      interval: 30s
      rules:

        # SLI de DISPONIBILIDAD, ventana 5m: fraccion de requests 5xx.
        - record: job:http_error_ratio:rate5m
          expr: |
            sum(rate(http_requests_received_total{job="events-api", code=~"5..", exported_endpoint!~"/health|/ready|/metrics"}[5m]))
            /
            clamp_min(sum(rate(http_requests_received_total{job="events-api", exported_endpoint!~"/health|/ready|/metrics"}[5m])), 0.001)

        # El MISMO SLI, ventana 1h (para confirmar que es sostenido).
        - record: job:http_error_ratio:rate1h
          expr: |
            sum(rate(http_requests_received_total{job="events-api", code=~"5..", exported_endpoint!~"/health|/ready|/metrics"}[1h]))
            /
            clamp_min(sum(rate(http_requests_received_total{job="events-api", exported_endpoint!~"/health|/ready|/metrics"}[1h])), 0.001)

        # SLI de LATENCIA, ventana 5m: fraccion de requests LENTAS (>256ms).
        - record: job:http_slow_ratio:rate5m
          expr: |
            1 - (
              sum(rate(http_request_duration_seconds_bucket{job="events-api", le="0.256", exported_endpoint!~"/health|/ready|/metrics"}[5m]))
              /
              clamp_min(sum(rate(http_request_duration_seconds_count{job="events-api", exported_endpoint!~"/health|/ready|/metrics"}[5m])), 0.001)
            )

    # ───────────────────────────────────────────────────────────────────
    # GRUPO 2 — ALERTING RULES: evaluan los SLIs y disparan alertas.
    # Patron BURN-RATE del Google SRE Book.
    # ───────────────────────────────────────────────────────────────────
    - name: events-api.slo.alerts
      rules:

        # ALERTA 1 — DISPONIBILIDAD, quema RAPIDA del error budget.
        # SLO 99% -> budget 1%. 14.4x = agota el budget mensual en ~2 dias.
        # Multi-ventana (5m Y 1h) para evitar falsas alarmas. -> pagina critica.
        - alert: EventsApiHighErrorBurnRateFast
          expr: |
            job:http_error_ratio:rate5m > (14.4 * 0.01)
            and
            job:http_error_ratio:rate1h > (14.4 * 0.01)
          for: 2m
          labels:
            severity: critical
            service: events-api
            slo: availability
          annotations:
            summary: "events-api quemando error budget MUY rapido"
            description: "Error rate {{`{{ $value | humanizePercentage }}`}} — a este ritmo el budget mensual se agota en ~2 dias."

        # ALERTA 2 — DISPONIBILIDAD, quema LENTA (degradacion sostenida).
        # 3x sobre 1h -> warning (ticket, no pagina).
        - alert: EventsApiHighErrorBurnRateSlow
          expr: |
            job:http_error_ratio:rate1h > (3 * 0.01)
          for: 15m
          labels:
            severity: warning
            service: events-api
            slo: availability
          annotations:
            summary: "events-api con error rate elevado sostenido"
            description: "Error rate {{`{{ $value | humanizePercentage }}`}} en la ultima hora."

        # ALERTA 3 — LATENCIA: demasiadas requests lentas (>256ms).
        # SLO 95% bajo 300ms -> permitimos 5% lentas. -> warning.
        - alert: EventsApiHighLatency
          expr: |
            job:http_slow_ratio:rate5m > 0.05
          for: 5m
          labels:
            severity: warning
            service: events-api
            slo: latency
          annotations:
            summary: "events-api lento: muchas requests >300ms"
            description: "{{`{{ $value | humanizePercentage }}`}} de las requests superan 300ms (SLO: <5%)."