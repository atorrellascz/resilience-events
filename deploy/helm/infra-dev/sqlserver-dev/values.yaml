image:
  repository: mcr.microsoft.com/mssql/server
  tag: "2022-CU14-ubuntu-22.04"
  pullPolicy: IfNotPresent

service:
  port: 1433

# Size of the persistent volume
storage:
  size: 2Gi

resources:
  requests:
    cpu: 250m
    memory: 1Gi        # SQL Server needs at least ~1GB
  limits:
    cpu: "1"
    memory: 2Gi