apiVersion: v1
kind: Service
metadata:
  name: sqlserver           # the other pods find it by this name
  labels:
    app: sqlserver
spec:
  clusterIP: None           # headless: gives each pod a stable network identity
  selector:
    app: sqlserver
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}