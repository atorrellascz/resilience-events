replicaCount: 1

image:
  repository: rep/remediation-controller
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  port: 8080

# Loop behavior (safe by default: dry-run ON, autonomy opt-in in prod).
loop:
  dryRun: "true"
  intervalSeconds: "30"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi