apiVersion: v1
kind: Service
metadata:
  name: edge-gateway
  labels:
    app: edge-gateway
spec:
  type: {{ .Values.service.type }}      # NodePort: reachable from your machine
  selector:
    app: edge-gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
      protocol: TCP