apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-ai
  labels:
    app: anomaly-ai
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: anomaly-ai
  template:
    metadata:
      labels:
        app: anomaly-ai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001          # the appuser from the Python Dockerfile
        fsGroup: 10001
      containers:
        - name: anomaly-ai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          # The full connection string comes from the Secret (no interpolation)
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: db-url
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.service.port }}
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]