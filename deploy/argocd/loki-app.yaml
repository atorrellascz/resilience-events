apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.24.0
    helm:
      releaseName: loki
      values: |
        # Modo single-binary: todo Loki en un pod (ideal local)
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 24h
        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          persistence:
            enabled: true
            size: 2Gi
        # Desactivar componentes del modo distribuido (no los usamos)
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        # Desactivar el cache (Memcached) — innecesario en local, ahorra RAM
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        # Desactivar self-monitoring y tests (ligereza local)
        lokiCanary:
          enabled: false
        test:
          enabled: false
        monitoring:
          selfMonitoring:
            enabled: false
            grafanaAgent:
              installOperator: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true