apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dashboards
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/atorrellascz/resilience-events.git
    targetRevision: main
    path: deploy/helm/dashboards      # tu chart de dashboards

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring             # donde corre Grafana

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true