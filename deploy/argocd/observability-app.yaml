apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.0
    helm:
      releaseName: kube-prometheus-stack
      values: |
        grafana:
          adminPassword: admin
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi

        prometheus:
          prometheusSpec:
            retention: 6h
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 800Mi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false

        alertmanager:
          alertmanagerSpec:
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
            secrets:
              - alertmanager-slack
            # Que el operador adopte AlertmanagerConfigs de cualquier namespace
            alertmanagerConfigSelector: {}
            alertmanagerConfigMatcherStrategy:
              type: None

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true