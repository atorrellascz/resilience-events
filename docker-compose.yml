# docker-compose.yml — Resilience Events platform (local)
# Perfiles: 'core' (spine de la demo) y 'full' (todo). Arranque:
#   docker compose --profile core up -d
#   docker compose --profile full up -d
name: resilience-events

networks:
  rep-net:            # red interna propia → aislamiento (blast radius)
    driver: bridge

volumes:              # estado explícito en named volumes → NUNCA en la capa del contenedor
  sqlserver-data:
  mongo-data:
  mysql-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── edge-gateway (Go) ── proxy + resiliencia + journaling (Fase 1) ──
  edge-gateway:
    build: ./services/edge-gateway
    image: rep/edge-gateway:0.1.0       # tag pineado, nunca :latest
    container_name: edge-gateway
    profiles: ["core", "full"]
    ports:
      - "8080:8080"                     # ÚNICA puerta pública de la plataforma
    environment:
      - EVENTS_API_URL=http://events-api:8080
    networks: [rep-net]
    depends_on:
      events-api:
        condition: service_healthy      # no arranca hasta que .NET esté sano
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── events-api (.NET) ── dueño de los event records → SQL Server ──
  events-api:
    build: ./services/events-api
    image: rep/events-api:0.1.0
    container_name: events-api
    profiles: ["core", "full"]
    expose:
      - "8080"                          # interno: solo se llega vía gateway
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Sql=Server=sqlserver,1433;Database=events;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
    networks: [rep-net]
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── SQL Server ── estado en named volume (lección de los 175 GB) ──
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: sqlserver
    profiles: ["core", "full"]
    expose:
      - "1433"                          # NO publicado al host → blast radius
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - sqlserver-data:/var/opt/mssql   # datos fuera de la capa del contenedor
    networks: [rep-net]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -No -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Redis ── infraestructura compartida: locks, cooldowns, cache ──
  redis:
    image: redis:7.4-alpine
    container_name: redis
    profiles: ["core", "full"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks: [rep-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped  

# ── Prometheus ── recolección de métricas (RED + SLOs) ──
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    profiles: ["core", "full"]
    ports:
      - "9090:9090"                     # UI publicada para que la veas en la demo
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [rep-net]
    restart: unless-stopped

  # ── Grafana ── dashboards + alertas visuales ──
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    profiles: ["core", "full"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true  # solo local, para abrir sin login en la demo
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [rep-net]
    depends_on: [prometheus]
    restart: unless-stopped    

