# Prometheus scrape config — which metrics to collect and how often
global:
  scrape_interval: 15s        # default scrape frequency
  evaluation_interval: 15s    # how often alert rules are evaluated (Phase 3)
  external_labels:
    platform: resilience-events   # label that marks every metric from this platform

scrape_configs:
  # Prometheus itself (to know whether the collector is healthy)
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Our services — Prometheus finds them by name on rep-net
  - job_name: edge-gateway
    static_configs:
      - targets: ["edge-gateway:8080"]
        labels: { service: edge-gateway, tier: edge }

  - job_name: events-api
    static_configs:
      - targets: ["events-api:8080"]
        labels: { service: events-api, tier: domain }

  # These two only respond in the 'full' profile — Prometheus will mark them
  # 'down' in the core profile, and that is FINE (visible absence, not a hidden error)
  - job_name: catalog-api
    static_configs:
      - targets: ["catalog-api:8080"]
        labels: { service: catalog-api, tier: domain }

  - job_name: anomaly-ai
    static_configs:
      - targets: ["anomaly-ai:8080"]
        labels: { service: anomaly-ai, tier: ai }
